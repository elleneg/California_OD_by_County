name: Update CA Death Data to Google Sheets

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests gspread oauth2client

      - name: Run Data Script
        env:
          # This links your GitHub Secret to the Python script
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLESHEETS_CA_OD_MAP_JSON }}
        run: python CA_OD_Code.py

      - name: Upload Backup CSV
        uses: actions/upload-artifact@v4
        with:
          name: CA-Death-Data-Backup
          path: CA_Death_Rates.csv
