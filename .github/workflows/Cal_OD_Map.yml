name: CA_OD_WEEKLY_UPDATE

on:
  push:
    branches:
      - main
  schedule:
    # This runs the script at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Data Script
        env:
          CAL_OD_DATAWRAPPER: ${{ secrets.CAL_OD_DATAWRAPPER }}
        run: python your_script_name.py # IMPORTANT: Change this to your actual .py filename

      - name: Upload CSV for Tableau
        uses: actions/upload-artifact@v4
        with:
          name: CA-Death-Data
          path: CA_Death_Rates.csv # Matches the filename in your .to_csv() script
